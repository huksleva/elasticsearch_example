services:
  app:
    image: moviesearch-simple
    container_name: moviesearch-simple
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_started
      elasticsearch:
        condition: service_healthy

    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/movies
      - SPRING_DATASOURCE_USERNAME=movies_user
      - SPRING_DATASOURCE_PASSWORD=movies_password
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200

  db:
    image: postgres:16.0-simple
    container_name: postgres_db-simple

    environment:
      POSTGRES_DB: movies
      POSTGRES_USER: movies_user
      POSTGRES_PASSWORD: movies_password

    ports:
      - "5432:5432"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4-simple
    container_name: elasticsearch-simple

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false

    ports:
      - "9200:9200"

    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20